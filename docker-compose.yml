services:
  stockddatabase:
    image: 'postgres:16.9-bullseye'
    container_name: postgres_db
    environment:
      POSTGRES_DB: StockDb        # ← زود السطر ده
      POSTGRES_USER: postgres     # ← وده كمان للتأكيد
      POSTGRES_PASSWORD: P@ssw0rd

    ports:
      - '5432:5432'
   
    volumes:
      - 'postgres_data:/var/lib/postgresql/data'
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s

  catalogddatabase:
    image: 'mongo'
    container_name: catalog_db
    ports:
      - '5433:5432'
    environment:
      POSTGRES_PASSWORD: P@ssw0rd
    volumes:
      - 'postgres_data:/var/lib/postgresql/data'
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
  rabbitmq:
    image: 'rabbitmq:3-management'
    container_name: rabbitmq
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - 'rabbitmq_data:/var/lib/rabbitmq'
    healthcheck:
      test:
        - CMD
        - rabbitmqctl
        - status
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always
  
  catalog.service.api:
    image: ${DOCKER_REGISTRY-}catalogserviceapi
    build:
      context: Services/Catalog/src/Catalog.Service.API
      dockerfile: Dockerfile
    depends_on:
      stockddatabase:
        condition: service_healthy
        restart: true

  stock.service.api:
    image: '${DOCKER_REGISTRY-}stockserviceapi'
    build:
      context: .
      dockerfile: Services/Stock/src/Stock.Service.API/Dockerfile
    ports:
      - '7113:8080'
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - 'ASPNETCORE_URLS=http://+:8080'
      - ConnectionStrings__default=Host=stockddatabase;Database=StockDb;Username=postgres;Password=P@ssw0rd
      - MQServerConnSettings__Host=rabbitmq
      - MQServerConnSettings__Port=5672
      - MQServerConnSettings__User=guest
      - MQServerConnSettings__Password=guest
      - MQServerConnSettings__SenderEnabled=true
      - MQServerConnSettings__ReceiverEnabled=false
    depends_on:
      stockddatabase:
        condition: service_healthy
        restart: true
      rabbitmq:
        condition: service_healthy
  
volumes:
  postgres_data: null
  rabbitmq_data: null
  mongo_data: null